<div class="wrap">
  <h1 id="title">Before / After</h1>

  <div class="compare" id="compare" aria-label="Before and After comparison">
    <div class="layer before" id="beforeLayer" aria-hidden="true"></div>
    <div class="layer after" id="afterLayer" aria-hidden="true"></div>

    <div class="handle" id="handle" role="slider"
      aria-valuemin="0" aria-valuemax="100" aria-valuenow="50"
      tabindex="0">
      <span class="knob" aria-hidden="true"></span>
    </div>
  </div>
</div>
